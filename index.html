<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic YT Clips</title>
    <style>
        body { margin: 0; background-color: #111; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #player-container { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: black; }
        #status { margin-top: 15px; font-size: 18px; color: #aaa; }
    </style>
</head>
<body>

    <div id="player-container">
        <div id="player"></div>
    </div>
    <div id="status">Loading clips...</div>

    <script>
        // 1. Parse the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');
        const clipsParam = urlParams.get('clips'); // Expected format: "10-20,45-60"
        
        let clips = [];
        let currentClipIndex = 0;
        let player;
        let timeChecker;

        // Convert the string "10-20,45-60" into an array of objects
        if (clipsParam) {
            clips = clipsParam.split(',').map(clip => {
                const parts = clip.split('-');
                return { start: parseFloat(parts[0]), end: parseFloat(parts[1]) };
            });
        }

        const statusText = document.getElementById('status');

        // 2. Load the YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 3. Initialize the Player
        function onYouTubeIframeAPIReady() {
            if (!videoId || clips.length === 0) {
                statusText.innerText = "Error: Missing video ID or clips in URL.";
                return;
            }

            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: { 
                    'playsinline': 1, 
                    'start': Math.floor(clips[0].start),
                    'autoplay': 1,
                    'controls': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            statusText.innerText = `Playing clip 1 of ${clips.length}`;
            event.target.playVideo();
            // Start checking the time every 100ms
            timeChecker = setInterval(checkTime, 100);
        }

        function onPlayerStateChange(event) {
            // If the user manually pauses, we still keep the interval running, 
            // but it won't trigger jumps unless the time exceeds the end time.
        }

        // 4. The Magic: Checking time and skipping
        function checkTime() {
            if (!player || !player.getCurrentTime) return;
            
            const currentTime = player.getCurrentTime();
            const currentClip = clips[currentClipIndex];

            // If we reach the end of the current clip
            if (currentTime >= currentClip.end) {
                currentClipIndex++;
                
                if (currentClipIndex < clips.length) {
                    // Jump to the next clip
                    player.seekTo(clips[currentClipIndex].start);
                    statusText.innerText = `Playing clip ${currentClipIndex + 1} of ${clips.length}`;
                } else {
                    // All clips finished
                    player.pauseVideo();
                    statusText.innerText = "All clips finished!";
                    clearInterval(timeChecker);
                }
            }
        }
    </script>
</body>
</html>
